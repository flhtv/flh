<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>فله تيفي</title>
<style>
body {font-family:Arial;background:#111;color:white;text-align:center;margin-top:50px;}
button{padding:12px 25px;margin:8px;font-size:18px;border:none;border-radius:10px;cursor:pointer;background:#ff9800;color:white;transition:0.2s;}
button:hover{background:#ffa733;}
iframe{margin-top:20px;width:80%;max-width:900px;height:500px;border:none;border-radius:10px;background:black;}
h1,h2{margin-bottom:15px;}
</style>
</head>
<body>

<h1>فله تيفي يهلّي بضيوفه 👋</h1>

<h2>المسلسلات</h2>
<div id="series"></div>

<h2 id="title"></h2>
<div id="episodes"></div>
<iframe id="player" allowfullscreen></iframe>

<script>
const data = `
المسلسل : شباب البومب
الحلقة : 18
السكربت : https://dl.dropboxusercontent.com/s/qzezvgtm8j1t6iu2k788j/18.mp4
المسلسل : شارع الأعشى
`;

const shows = {};
const lines = data.trim().split("\n");
let currentShow="", currentEp="", currentLink="";

lines.forEach(line=>{
    line=line.trim();
    if(line.startsWith("المسلسل")){
        currentShow=line.split(":")[1].trim();
        if(!shows[currentShow]) shows[currentShow]={};
    }
    if(line.startsWith("الحلقة")) currentEp=line.split(":")[1].trim();
    if(line.startsWith("السكربت")){
        currentLink=line.split(":")[1].trim();
        shows[currentShow][currentEp]=currentLink;
    }
});

const seriesDiv=document.getElementById("series");
const episodesDiv=document.getElementById("episodes");
const player=document.getElementById("player");

for(let show in shows){
    let btn=document.createElement("button");
    btn.innerText=show;
    btn.onclick=()=>{
        document.getElementById("title").innerText=show;
        episodesDiv.innerHTML="";
        player.src=""; // تفريغ الفيديو عند تغيير المسلسل
        for(let ep in shows[show]){
            let epBtn=document.createElement("button");
            epBtn.innerText="الحلقة "+ep;
            epBtn.onclick=()=>{
                player.src=shows[show][ep]; // يظهر الفيديو عند الضغط فقط
            };
            episodesDiv.appendChild(epBtn);
        }
    };
    seriesDiv.appendChild(btn);
}
</script>

</body>
</html>
